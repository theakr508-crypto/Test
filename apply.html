<section class="page-section">
<h1>Apply for Job</h1>

<form class="form-box" onsubmit="sendWhatsApp(event)">

<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="message">
<option>Fresher</option>
<option>1-2 Years Experience</option>
<option>3+ Years Experience</option>
</select>

<textarea placeholder="Additional Details"></textarea>

<button class="btn">Apply via WhatsApp</button>

</form>
<div id="successPopup" class="popup">
    <p>✅ Submitted Successfully!</p>
</div>
</section>
