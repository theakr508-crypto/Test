<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Durgesh Security</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Durgesh Security</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="contact reveal">
    <h2>Hire Security Guards</h2>

    <div class="form-box">
        <form onsubmit="handleContact(event)">

            <div class="input-group">
                <input type="text" id="name" required>
                <label>Your Name</label>
            </div>

            <div class="input-group">
                <input type="tel" id="phone" required>
                <label>Phone Number</label>
            </div>

            <div class="input-group">
                <input type="email" id="email">
                <label>Email (optional)</label>
            </div>

            <div class="input-group">
                <textarea id="message"></textarea>
                <label>Your Requirement</label>
            </div>

            <button type="submit" class="btn">Send via WhatsApp</button>
            <button type="button" class="btn secondary" onclick="sendEmail()">
    Send via Email
</button>
        </form>
    </div>

    <p>📧 Dcorporate@rediffmail.com</p>
    <p>📍 New Market, Sarai Ganj, Muzaffarpur</p>

</section>

<div id="successPopup">✅ Message sent!</div>

<footer>
    <p>© 2026 Durgesh Security Services Pvt. Ltd.</p>
</footer>

<!-- LOADING SCREEN -->
<div id="loader" class="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
</div>

<script src="script.js"></script>

</body>
</html>
